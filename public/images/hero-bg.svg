<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bgHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="50%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#0F172A"/>
    </linearGradient>
    <linearGradient id="accentHero" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
    <pattern id="gridHero" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#bgHero)"/>
  <rect width="1200" height="600" fill="url(#gridHero)"/>
  
  <!-- Industrial silhouette -->
  <g fill="#1E3A5F" opacity="0.3">
    <!-- Left buildings -->
    <rect x="50" y="300" width="100" height="200"/>
    <rect x="170" y="250" width="80" height="250"/>
    <rect x="270" y="280" width="120" height="220"/>
    
    <!-- Silos -->
    <ellipse cx="450" cy="350" rx="40" ry="80"/>
    <ellipse cx="520" cy="350" rx="40" ry="80"/>
    <ellipse cx="590" cy="350" rx="40" ry="80"/>
    
    <!-- Right buildings -->
    <rect x="700" y="280" width="150" height="220"/>
    <rect x="870" y="300" width="100" height="200"/>
    <rect x="990" y="320" width="130" height="180"/>
  </g>
  
  <!-- Gear decorations -->
  <g stroke="#F59E0B" stroke-width="3" fill="none" opacity="0.2">
    <circle cx="100" cy="100" r="40"/>
    <circle cx="100" cy="100" r="30"/>
    <line x1="100" y1="60" x2="100" y2="140"/>
    <line x1="60" y1="100" x2="140" y2="100"/>
    
    <circle cx="1100" cy="500" r="50"/>
    <circle cx="1100" cy="500" r="35"/>
    <line x1="1100" y1="450" x2="1100" y2="550"/>
    <line x1="1050" y1="500" x2="1150" y2="500"/>
  </g>
  
  <!-- Rice plants -->
  <g fill="#F59E0B" opacity="0.3">
    <ellipse cx="100" cy="550" rx="15" ry="8" transform="rotate(-20 100 550)"/>
    <ellipse cx="130" cy="540" rx="15" ry="8" transform="rotate(15 130 540)"/>
    <ellipse cx="160" cy="545" rx="15" ry="8" transform="rotate(-10 160 545)"/>
    
    <ellipse cx="1040" cy="550" rx="15" ry="8" transform="rotate(-15 1040 550)"/>
    <ellipse cx="1070" cy="540" rx="15" ry="8" transform="rotate(20 1070 540)"/>
    <ellipse cx="1100" cy="545" rx="15" ry="8" transform="rotate(-5 1100 545)"/>
  </g>
  
  <!-- Decorative lines -->
  <g stroke="#F59E0B" stroke-width="2" opacity="0.4">
    <line x1="0" y1="580" x2="1200" y2="580"/>
    <line x1="200" y1="590" x2="1000" y2="590"/>
  </g>
  
  <!-- Light rays -->
  <g fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.1">
    <line x1="600" y1="0" x2="200" y2="600"/>
    <line x1="600" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/>
    <line x1="600" y1="0" x2="800" y2="600"/>
    <line x1="600" y1="0" x2="1000" y2="600"/>
  </g>
  
  <!-- Central glow -->
  <ellipse cx="600" cy="300" rx="300" ry="200" fill="#F59E0B" opacity="0.05"/>
</svg>