<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="blue5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gold5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg5)"/>
  
  <!-- Blueprint grid -->
  <g opacity="0.15" stroke="#60A5FA" stroke-width="0.5">
    <line x1="50" y1="50" x2="550" y2="50"/>
    <line x1="50" y1="100" x2="550" y2="100"/>
    <line x1="50" y1="150" x2="550" y2="150"/>
    <line x1="50" y1="200" x2="550" y2="200"/>
    <line x1="50" y1="250" x2="550" y2="250"/>
    <line x1="50" y1="300" x2="550" y2="300"/>
    <line x1="50" y1="350" x2="550" y2="350"/>
    <line x1="50" y1="50" x2="50" y2="350"/>
    <line x1="100" y1="50" x2="100" y2="350"/>
    <line x1="150" y1="50" x2="150" y2="350"/>
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="250" y1="50" x2="250" y2="350"/>
    <line x1="300" y1="50" x2="300" y2="350"/>
    <line x1="350" y1="50" x2="350" y2="350"/>
    <line x1="400" y1="50" x2="400" y2="350"/>
    <line x1="450" y1="50" x2="450" y2="350"/>
    <line x1="500" y1="50" x2="500" y2="350"/>
    <line x1="550" y1="50" x2="550" y2="350"/>
  </g>
  
  <!-- Blueprint drawing -->
  <g transform="translate(120, 70)">
    <!-- Building outline -->
    <rect x="0" y="80" width="260" height="150" fill="none" stroke="#60A5FA" stroke-width="3"/>
    
    <!-- Roof -->
    <polygon points="0,80 130,30 260,80" fill="none" stroke="#60A5FA" stroke-width="3"/>
    
    <!-- Internal walls -->
    <line x1="85" y1="80" x2="85" y2="230" stroke="#60A5FA" stroke-width="2"/>
    <line x1="175" y1="80" x2="175" y2="230" stroke="#60A5FA" stroke-width="2"/>
    <line x1="0" y1="150" x2="260" y2="150" stroke="#60A5FA" stroke-width="2"/>
    
    <!-- Dimensions -->
    <line x1="0" y1="250" x2="260" y2="250" stroke="#F59E0B" stroke-width="1"/>
    <line x1="0" y1="245" x2="0" y2="255" stroke="#F59E0B" stroke-width="2"/>
    <line x1="260" y1="245" x2="260" y2="255" stroke="#F59E0B" stroke-width="2"/>
    <text x="130" y="270" font-family="Arial" font-size="12" fill="#F59E0B" text-anchor="middle">30m</text>
    
    <line x1="280" y1="80" x2="280" y2="230" stroke="#F59E0B" stroke-width="1"/>
    <line x1="275" y1="80" x2="285" y2="80" stroke="#F59E0B" stroke-width="2"/>
    <line x1="275" y1="230" x2="285" y2="230" stroke="#F59E0B" stroke-width="2"/>
    <text x="300" y="160" font-family="Arial" font-size="12" fill="#F59E0B" transform="rotate(90 300 160)">12m</text>
  </g>
  
  <!-- Tools -->
  <g transform="translate(420, 100)">
    <!-- Ruler -->
    <rect x="0" y="0" width="120" height="15" fill="#F59E0B" rx="2"/>
    <line x1="10" y1="0" x2="10" y2="15" stroke="#92400E" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="10" stroke="#92400E" stroke-width="1"/>
    <line x1="30" y1="0" x2="30" y2="15" stroke="#92400E" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="10" stroke="#92400E" stroke-width="1"/>
    <line x1="50" y1="0" x2="50" y2="15" stroke="#92400E" stroke-width="1"/>
    
    <!-- Pencil -->
    <rect x="0" y="30" width="80" height="8" fill="#F59E0B" rx="2"/>
    <polygon points="80,30 95,34 80,38" fill="#92400E"/>
    
    <!-- Compass -->
    <line x1="20" y1="60" x2="60" y2="60" stroke="#6B7280" stroke-width="3"/>
    <circle cx="20" cy="60" r="5" fill="#4B5563"/>
    <line x1="60" y1="60" x2="60" y2="90" stroke="#6B7280" stroke-width="2"/>
    <circle cx="60" cy="90" r="3" fill="#F59E0B"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle" font-weight="bold">DISEÑO DE PILADORAS</text>
</svg>