<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="fire6" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="40%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
    <linearGradient id="metal6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB"/>
      <stop offset="50%" style="stop-color="#9CA3AF"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg6)"/>
  
  <!-- Sparks -->
  <g fill="#F59E0B">
    <circle cx="280" cy="200" r="2"/>
    <circle cx="290" cy="180" r="3"/>
    <circle cx="300" cy="210" r="2"/>
    <circle cx="270" cy="190" r="2"/>
    <circle cx="310" cy="195" r="3"/>
    <circle cx="285" cy="220" r="2"/>
    <circle cx="305" cy="175" r="2"/>
    <circle cx="275" cy="215" r="2"/>
  </g>
  
  <!-- Welding torch -->
  <g transform="translate(250, 150)">
    <!-- Torch body -->
    <rect x="0" y="0" width="100" height="20" fill="#374151" rx="4"/>
    <rect x="80" y="5" width="40" height="10" fill="#4B5563" rx="2"/>
    
    <!-- Cable -->
    <path d="M0 10 Q-30 10 -40 40 Q-50 70 -30 100" stroke="#1F2937" stroke-width="8" fill="none"/>
    
    <!-- Arc light -->
    <circle cx="120" cy="10" r="25" fill="url(#fire6)" opacity="0.8"/>
    <circle cx="120" cy="10" r="10" fill="#FEF3C7"/>
  </g>
  
  <!-- Metal pieces being welded -->
  <g transform="translate(200, 220)">
    <rect x="0" y="0" width="150" height="20" fill="url(#metal6)" rx="2"/>
    <rect x="150" y="-30" width="20" height="80" fill="url(#metal6)" rx="2"/>
    <line x1="150" y1="0" x2="150" y2="20" stroke="#F59E0B" stroke-width="4"/>
  </g>
  
  <!-- Welding helmet -->
  <g transform="translate(180, 100)">
    <ellipse cx="50" cy="50" rx="45" ry="40" fill="#1F2937"/>
    <rect x="20" y="40" width="60" height="25" fill="#374151" rx="4"/>
    <rect x="25" y="45" width="50" height="15" fill="#065F46" rx="2"/>
  </g>
  
  <!-- Metal structure -->
  <g transform="translate(50, 280)">
    <rect x="0" y="0" width="500" height="15" fill="#4B5563"/>
    <rect x="50" y="0" width="15" height="60" fill="#4B5563"/>
    <rect x="200" y="0" width="15" height="60" fill="#4B5563"/>
    <rect x="350" y="0" width="15" height="60" fill="#4B5563"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle" font-weight="bold">SOLDADURA INDUSTRIAL</text>
</svg>