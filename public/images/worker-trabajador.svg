<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgWorker" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="uniform" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="helmet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgWorker)"/>
  
  <!-- Industrial background -->
  <g opacity="0.2">
    <rect x="50" y="100" width="100" height="150" fill="#4B5563"/>
    <rect x="170" y="80" width="80" height="170" fill="#4B5563"/>
    <rect x="270" y="120" width="80" height="130" fill="#4B5563"/>
  </g>
  
  <!-- Person -->
  <g transform="translate(200, 120)">
    <!-- Body -->
    <ellipse cx="0" cy="120" rx="50" ry="70" fill="url(#uniform)"/>
    
    <!-- Arms -->
    <rect x="-60" y="80" width="20" height="80" fill="url(#uniform)" rx="10"/>
    <rect x="40" y="80" width="20" height="80" fill="url(#uniform)" rx="10"/>
    
    <!-- Hands -->
    <circle cx="-50" cy="165" r="12" fill="#D1A56A"/>
    <circle cx="50" cy="165" r="12" fill="#D1A56A"/>
    
    <!-- Neck -->
    <rect x="-10" y="50" width="20" height="20" fill="#D1A56A"/>
    
    <!-- Head -->
    <circle cx="0" cy="30" r="35" fill="#D1A56A"/>
    
    <!-- Helmet -->
    <ellipse cx="0" cy="10" rx="40" ry="25" fill="url(#helmet)"/>
    <rect x="-45" y="5" width="90" height="10" fill="#D97706" rx="5"/>
    
    <!-- Face -->
    <circle cx="-12" cy="30" r="4" fill="#1F2937"/>
    <circle cx="12" cy="30" r="4" fill="#1F2937"/>
    <path d="M-10 45 Q0 55 10 45" stroke="#1F2937" stroke-width="2" fill="none"/>
    
    <!-- Safety vest stripes -->
    <rect x="-40" y="90" width="80" height="5" fill="#F59E0B" rx="2"/>
    <rect x="-40" y="110" width="80" height="5" fill="#F59E0B" rx="2"/>
    <rect x="-40" y="130" width="80" height="5" fill="#F59E0B" rx="2"/>
  </g>
  
  <!-- Tools -->
  <g transform="translate(80, 200)">
    <rect x="0" y="0" width="8" height="60" fill="#6B7280" rx="2"/>
    <rect x="-5" y="55" width="18" height="8" fill="#4B5563" rx="2"/>
  </g>
  
  <!-- Badge -->
  <rect x="140" y="250" width="120" height="30" fill="#F59E0B" rx="15"/>
  <text x="200" y="270" font-family="Arial, sans-serif" font-size="12" fill="#1F2937" text-anchor="middle" font-weight="bold">PERSONAL</text>
</svg>