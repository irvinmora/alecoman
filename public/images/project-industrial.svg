<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bgProj" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="skyProj" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="steelProj" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB"/>
      <stop offset="50%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgProj)"/>
  
  <!-- Sky -->
  <rect x="0" y="0" width="600" height="200" fill="url(#skyProj)" opacity="0.3"/>
  
  <!-- Ground -->
  <rect x="0" y="280" width="600" height="120" fill="#374151"/>
  <rect x="0" y="280" width="600" height="5" fill="#4B5563"/>
  
  <!-- Industrial complex -->
  <g transform="translate(50, 100)">
    <!-- Main building -->
    <rect x="0" y="100" width="200" height="80" fill="url(#steelProj)"/>
    <rect x="10" y="110" width="180" height="60" fill="#E5E7EB"/>
    <rect x="-10" y="85" width="220" height="20" fill="#6B7280"/>
    
    <!-- Silos -->
    <ellipse cx="280" cy="130" rx="30" ry="50" fill="url(#steelProj)" stroke="#9CA3AF" stroke-width="2"/>
    <ellipse cx="340" cy="130" rx="30" ry="50" fill="url(#steelProj)" stroke="#9CA3AF" stroke-width="2"/>
    <ellipse cx="400" cy="130" rx="30" ry="50" fill="url(#steelProj)" stroke="#9CA3AF" stroke-width="2"/>
    <ellipse cx="280" cy="80" rx="30" ry="10" fill="#9CA3AF"/>
    <ellipse cx="340" cy="80" rx="30" ry="10" fill="#9CA3AF"/>
    <ellipse cx="400" cy="80" rx="30" ry="10" fill="#9CA3AF"/>
    
    <!-- Conveyor -->
    <rect x="200" y="150" width="80" height="10" fill="#4B5563" transform="rotate(-15 200 150)"/>
    <circle cx="200" cy="150" r="8" fill="#374151" stroke="#6B7280" stroke-width="2"/>
    <circle cx="280" cy="130" r="8" fill="#374151" stroke="#6B7280" stroke-width="2"/>
    
    <!-- Tower -->
    <rect x="450" y="60" width="40" height="120" fill="#4B5563"/>
    <rect x="445" y="50" width="50" height="15" fill="#6B7280"/>
    
    <!-- Windows -->
    <rect x="30" y="120" width="30" height="25" fill="#60A5FA" rx="2" opacity="0.6"/>
    <rect x="80" y="120" width="30" height="25" fill="#60A5FA" rx="2" opacity="0.6"/>
    <rect x="130" y="120" width="30" height="25" fill="#60A5FA" rx="2" opacity="0.6"/>
  </g>
  
  <!-- Smoke stack -->
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="20" height="100" fill="#6B7280"/>
    <rect x="-5" y="0" width="30" height="10" fill="#4B5563"/>
    <path d="M10 0 Q15 -20 10 -40 Q5 -60 10 -80" stroke="#9CA3AF" stroke-width="4" fill="none" opacity="0.5"/>
  </g>
  
  <!-- Label -->
  <rect x="150" y="320" width="300" height="40" fill="#1E3A5F" rx="8" opacity="0.9"/>
  <text x="300" y="347" font-family="Arial, sans-serif" font-size="16" fill="#F59E0B" text-anchor="middle" font-weight="bold">PROYECTO INDUSTRIAL COMPLETO</text>
</svg>