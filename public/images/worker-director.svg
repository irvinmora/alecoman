<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bgOwner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="suit" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="tie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" fill="url(#bgOwner)"/>
  
  <!-- Subtle pattern -->
  <g opacity="0.1">
    <rect x="30" y="30" width="340" height="340" fill="none" stroke="#F59E0B" stroke-width="1" rx="20"/>
    <rect x="40" y="40" width="320" height="320" fill="none" stroke="#F59E0B" stroke-width="1" rx="16"/>
  </g>
  
  <!-- Person -->
  <g transform="translate(200, 100)">
    <!-- Body - Suit -->
    <ellipse cx="0" cy="130" rx="60" ry="80" fill="url(#suit)"/>
    
    <!-- Shoulders -->
    <rect x="-65" y="80" width="130" height="40" fill="url(#suit)" rx="20"/>
    
    <!-- Arms -->
    <rect x="-75" y="90" width="20" height="90" fill="url(#suit)" rx="10"/>
    <rect x="55" y="90" width="20" height="90" fill="url(#suit)" rx="10"/>
    
    <!-- Hands -->
    <circle cx="-65" cy="185" r="12" fill="#D1A56A"/>
    <circle cx="65" cy="185" r="12" fill="#D1A56A"/>
    
    <!-- Shirt -->
    <rect x="-25" y="80" width="50" height="100" fill="#E5E7EB"/>
    
    <!-- Tie -->
    <polygon points="0,85 -8,100 0,180 8,100" fill="url(#tie)"/>
    
    <!-- Neck -->
    <rect x="-10" y="50" width="20" height="25" fill="#D1A56A"/>
    
    <!-- Head -->
    <circle cx="0" cy="25" r="40" fill="#D1A56A"/>
    
    <!-- Hair -->
    <ellipse cx="0" cy="0" rx="42" ry="25" fill="#374151"/>
    
    <!-- Face -->
    <circle cx="-14" cy="25" r="4" fill="#1F2937"/>
    <circle cx="14" cy="25" r="4" fill="#1F2937"/>
    <ellipse cx="0" cy="35" rx="3" ry="2" fill="#D97706"/>
    <path d="M-12 45 Q0 55 12 45" stroke="#1F2937" stroke-width="2" fill="none"/>
    
    <!-- Glasses -->
    <circle cx="-14" cy="25" r="8" fill="none" stroke="#374151" stroke-width="2"/>
    <circle cx="14" cy="25" r="8" fill="none" stroke="#374151" stroke-width="2"/>
    <line x1="-6" y1="25" x2="6" y2="25" stroke="#374151" stroke-width="2"/>
  </g>
  
  <!-- Badge -->
  <rect x="120" y="320" width="160" height="35" fill="#F59E0B" rx="17"/>
  <text x="200" y="343" font-family="Arial, sans-serif" font-size="13" fill="#1F2937" text-anchor="middle" font-weight="bold">DIRECTOR</text>
</svg>