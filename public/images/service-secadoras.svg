<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="steel3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB"/>
      <stop offset="50%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <linearGradient id="heat3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="50%" style="stop-color:#EF4444"/>
      <stop offset="100%" style="stop-color:#DC2626"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg3)"/>
  
  <!-- Tower Dryer -->
  <g transform="translate(200, 50)">
    <!-- Main tower -->
    <rect x="50" y="0" width="100" height="250" fill="url(#steel3)" rx="4"/>
    <rect x="60" y="10" width="80" height="230" fill="#374151" rx="2"/>
    
    <!-- Sections -->
    <rect x="55" y="50" width="90" height="3" fill="#6B7280"/>
    <rect x="55" y="100" width="90" height="3" fill="#6B7280"/>
    <rect x="55" y="150" width="90" height="3" fill="#6B7280"/>
    <rect x="55" y="200" width="90" height="3" fill="#6B7280"/>
    
    <!-- Heat indication -->
    <rect x="70" y="60" width="60" height="30" fill="url(#heat3)" opacity="0.6" rx="2"/>
    <rect x="70" y="110" width="60" height="30" fill="url(#heat3)" opacity="0.4" rx="2"/>
    <rect x="70" y="160" width="60" height="30" fill="url(#heat3)" opacity="0.2" rx="2"/>
    
    <!-- Top hopper -->
    <polygon points="70,0 130,0 120,-30 80,-30" fill="#4B5563"/>
    
    <!-- Base -->
    <rect x="30" y="250" width="140" height="30" fill="#4B5563" rx="4"/>
    <rect x="40" y="280" width="120" height="20" fill="#374151" rx="2"/>
    
    <!-- Pipes -->
    <rect x="150" y="100" width="60" height="15" fill="#6B7280" rx="3"/>
    <rect x="150" y="150" width="60" height="15" fill="#6B7280" rx="3"/>
    <circle cx="210" cy="107" r="10" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
    <circle cx="210" cy="157" r="10" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
    
    <!-- Fan -->
    <circle cx="-20" cy="150" r="30" fill="#374151" stroke="#6B7280" stroke-width="3"/>
    <circle cx="-20" cy="150" r="15" fill="#4B5563"/>
    <line x1="-20" y1="120" x2="-20" y2="180" stroke="#6B7280" stroke-width="2"/>
    <line x1="-50" y1="150" x2="10" y2="150" stroke="#6B7280" stroke-width="2"/>
    
    <!-- Control box -->
    <rect x="-60" y="200" width="50" height="40" fill="#1F2937" rx="4"/>
    <circle cx="-45" cy="215" r="6" fill="#10B981"/>
    <circle cx="-30" cy="215" r="6" fill="#EF4444"/>
    <rect x="-55" y="228" width="40" height="6" fill="#374151" rx="2"/>
  </g>
  
  <!-- Steam/heat waves -->
  <g stroke="#F59E0B" stroke-width="2" fill="none" opacity="0.5">
    <path d="M280 20 Q285 10 280 0"/>
    <path d="M300 15 Q305 5 300 -5"/>
    <path d="M320 20 Q325 10 320 0"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle" font-weight="bold">SECADORAS DE ARROZ</text>
</svg>