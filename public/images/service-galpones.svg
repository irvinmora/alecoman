<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="metal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D1D5DB"/>
      <stop offset="50%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#6B7280"/>
    </linearGradient>
    <linearGradient id="roof2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626"/>
      <stop offset="100%" style="stop-color:#991B1B"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg2)"/>
  
  <!-- Ground -->
  <rect x="0" y="320" width="600" height="80" fill="#374151"/>
  <rect x="0" y="320" width="600" height="5" fill="#4B5563"/>
  
  <!-- Industrial Shed -->
  <g transform="translate(100, 100)">
    <!-- Main structure -->
    <rect x="0" y="80" width="400" height="140" fill="url(#metal2)"/>
    
    <!-- Roof -->
    <polygon points="0,80 200,20 400,80" fill="url(#roof2)"/>
    <polygon points="0,80 200,30 400,80" fill="none" stroke="#7F1D1D" stroke-width="2"/>
    
    <!-- Columns -->
    <rect x="20" y="80" width="15" height="140" fill="#4B5563"/>
    <rect x="100" y="80" width="15" height="140" fill="#4B5563"/>
    <rect x="190" y="80" width="15" height="140" fill="#4B5563"/>
    <rect x="280" y="80" width="15" height="140" fill="#4B5563"/>
    <rect x="365" y="80" width="15" height="140" fill="#4B5563"/>
    
    <!-- Cross beams -->
    <rect x="0" y="120" width="400" height="8" fill="#6B7280"/>
    <rect x="0" y="180" width="400" height="8" fill="#6B7280"/>
    
    <!-- Door -->
    <rect x="150" y="140" width="100" height="80" fill="#1F2937" rx="4"/>
    <rect x="155" y="145" width="90" height="75" fill="#374151" rx="2"/>
    <line x1="200" y1="145" x2="200" y2="220" stroke="#4B5563" stroke-width="2"/>
    
    <!-- Windows -->
    <rect x="30" y="100" width="60" height="40" fill="#60A5FA" rx="2" opacity="0.6"/>
    <rect x="310" y="100" width="60" height="40" fill="#60A5FA" rx="2" opacity="0.6"/>
    <line x1="60" y1="100" x2="60" y2="140" stroke="#3B82F6" stroke-width="1"/>
    <line x1="30" y1="120" x2="90" y2="120" stroke="#3B82F6" stroke-width="1"/>
    <line x1="340" y1="100" x2="340" y2="140" stroke="#3B82F6" stroke-width="1"/>
    <line x1="310" y1="120" x2="370" y2="120" stroke="#3B82F6" stroke-width="1"/>
    
    <!-- Crane -->
    <rect x="420" y="40" width="10" height="180" fill="#F59E0B"/>
    <rect x="410" y="40" width="80" height="10" fill="#F59E0B"/>
    <line x1="490" y1="50" x2="490" y2="120" stroke="#6B7280" stroke-width="2"/>
    <rect x="480" y="120" width="20" height="15" fill="#374151"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="370" font-family="Arial, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle" font-weight="bold">CONSTRUCCIÓN DE GALPONES</text>
</svg>