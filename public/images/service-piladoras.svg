<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E3A5F"/>
    </linearGradient>
    <linearGradient id="steel1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5E7EB"/>
      <stop offset="50%" style="stop-color:#9CA3AF"/>
      <stop offset="100%" style="stop-color:#4B5563"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#D97706"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bg1)"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="50" x2="600" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="600" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="600" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="600" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="600" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="350" x2="600" y2="350" stroke="#fff" stroke-width="0.5"/>
    <line x1="50" y1="0" x2="50" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="150" y1="0" x2="150" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="250" y1="0" x2="250" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="350" y1="0" x2="350" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="450" y1="0" x2="450" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="550" y1="0" x2="550" y2="400" stroke="#fff" stroke-width="0.5"/>
  </g>
  
  <!-- Rice Mill Machine -->
  <g transform="translate(150, 80)">
    <!-- Main structure -->
    <rect x="0" y="60" width="300" height="180" fill="url(#steel1)" rx="8"/>
    <rect x="10" y="70" width="280" height="160" fill="#1F2937" rx="4"/>
    
    <!-- Hopper -->
    <polygon points="100,0 200,0 180,60 120,60" fill="#374151" stroke="#6B7280" stroke-width="2"/>
    <polygon points="130,10 170,10 165,50 135,50" fill="#4B5563"/>
    
    <!-- Processing chamber -->
    <rect x="40" y="100" width="120" height="80" fill="#374151" rx="4"/>
    <circle cx="100" cy="140" r="30" fill="#1F2937" stroke="#F59E0B" stroke-width="3"/>
    <circle cx="100" cy="140" r="15" fill="#F59E0B"/>
    
    <!-- Output chute -->
    <rect x="160" y="120" width="100" height="40" fill="#4B5563" rx="4"/>
    <rect x="180" y="130" width="60" height="20" fill="#374151" rx="2"/>
    
    <!-- Control panel -->
    <rect x="200" y="80" width="80" height="60" fill="#111827" rx="4"/>
    <circle cx="220" cy="100" r="8" fill="#10B981"/>
    <circle cx="245" cy="100" r="8" fill="#EF4444"/>
    <rect x="210" y="115" width="60" height="8" fill="#374151" rx="2"/>
    
    <!-- Pipes -->
    <rect x="50" y="180" width="200" height="15" fill="#6B7280" rx="3"/>
    <circle cx="70" cy="187" r="10" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
    <circle cx="230" cy="187" r="10" fill="#4B5563" stroke="#6B7280" stroke-width="2"/>
  </g>
  
  <!-- Rice grains -->
  <g fill="#FEF3C7">
    <ellipse cx="380" cy="320" rx="8" ry="4" transform="rotate(-30 380 320)"/>
    <ellipse cx="400" cy="330" rx="8" ry="4" transform="rotate(20 400 330)"/>
    <ellipse cx="420" cy="315" rx="8" ry="4" transform="rotate(-15 420 315)"/>
    <ellipse cx="390" cy="345" rx="8" ry="4" transform="rotate(45 390 345)"/>
    <ellipse cx="415" cy="340" rx="8" ry="4" transform="rotate(-25 415 340)"/>
    <ellipse cx="440" cy="325" rx="8" ry="4" transform="rotate(10 440 325)"/>
  </g>
  
  <!-- Title -->
  <text x="300" y="380" font-family="Arial, sans-serif" font-size="18" fill="#F59E0B" text-anchor="middle" font-weight="bold">MANTENIMIENTO DE PILADORAS</text>
</svg>